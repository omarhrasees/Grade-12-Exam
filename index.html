    // Audio context for click sounds (suitable clicking sound)
    function playClick() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 880;
            gainNode.gain.value = 0.15;
            oscillator.type = "sine";
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.15);
            oscillator.stop(audioCtx.currentTime + 0.15);
            // resume if suspended
            if (audioCtx.state === 'suspended') audioCtx.resume();
        } catch(e) { /* fallback silent */ }
    }

    // Attach click sounds to all interactive elements dynamically
    function attachSoundsToContainer(container) {
        if (!container) return;
        const clickables = container.querySelectorAll('button, .tab-btn, .option-label, input[type="radio"]');
        clickables.forEach(el => {
            if (!el.hasAttribute('data-sound-attached')) {
                el.setAttribute('data-sound-attached', 'true');
                el.addEventListener('click', (e) => { playClick(); });
            }
        });
    }

    // Global sound on static buttons
    document.addEventListener('click', (e) => {
        if (e.target.closest('.tab-btn') || e.target.closest('.submit-btn') || e.target.closest('.reset-btn') || e.target.closest('.page-btn')) {

        }

    addQ(9, "97. It ______ me how anyone can create ideas.", "blows", "beats", "pulls", "scratches", "B");
    addQ(9, "98. Goes ______ all the rules.", "against", "over", "through", "with", "A");
    addQ(9, "99. Objects are very ______.", "convincing", "unreal", "imaginative", "mysterious", "A");
    addQ(9, "100. Took ages to ______ the file.", "cease", "linger", "retrieve", "rectify", "C");
    addQ(9, "101. You'll ______ the term.", "hear", "be hearing", "have heard", "hearing", "A");
    addQ(9, "102. They ______ at the restaurant now.", "will be", "would be", "will have been", "would have been", "A");
    addQ(9, "103. I'll ______ a couple now.", "book", "be booking", "have booked", "have been booking", "A");
    addQ(9, "104. He would ______ at that time.", "be driving", "have driven", "have been driving", "drive", "C");
    addQ(9, "105. Omitting a sound quickly is:", "assimilation", "intrusion", "elision", "contraction", "C");

    // ================= MODULE 10 (106-117) =================
    addQ(10, "106. Got to ______ the ropes.", "learn", "meet", "call", "sign", "A");
    addQ(10, "107. Take a back ______.", "seat", "lap", "way", "fuse", "A");
    addQ(10, "108. Strike the right ______.", "connectivity", "balance", "dividends", "significance", "B");
    addQ(10, "109. Identify aims and ______ for them.", "call", "meet", "strive", "work", "C");
    addQ(10, "110. Quickly went down: ______ down.", "popped", "called", "worked", "learned", "A");
    addQ(10, "111. It is ______ that she'll get the job.", "a given", "a one-off", "upfront", "a pipe dream", "A");
    addQ(10, "112. Juggle ______ demands.", "unremitting", "unacceptable", "upfront", "unrealistic", "A");
    addQ(10, "113. Lucky ______ (give) money.", "to give", "to be given", "giving", "being given", "B");
    addQ(10, "114. Regret to say vs regret saying: same?", "same", "different", "identical", "similar", "B");
    addQ(10, "115. Managed ______ over $100.", "to save", "saving", "to saving", "for saving", "A");
    addQ(10, "116. Happy ______ (offer) overtime.", "to offer", "to be offered", "offering", "being offered", "B");
    addQ(10, "117. Why pauses in speech?", "only breathe", "emphasis, topic, clarify, filler", "tone only", "replace stops", "B");

    // ========== PAGINATION + MODULE STATE ==========
    let currentModule = "all";
    let userAnswers = new Array(allQuestionsData.length).fill(null);
    let graded = false;
    let currentPage = 0;
    const QUESTIONS_PER_PAGE = 10;

    function getFilteredQuestions() {
        if (currentModule === "all") return allQuestionsData.map((q, idx) => ({ ...q, originalIndex: idx }));
        return allQuestionsData.map((q, idx) => ({ ...q, originalIndex: idx })).filter(q => q.module === currentModule);
    }

    function renderQuestions() {
        const filtered = getFilteredQuestions();
        const totalPages = Math.ceil(filtered.length / QUESTIONS_PER_PAGE);
        if (currentPage >= totalPages) currentPage = Math.max(0, totalPages - 1);
        const start = currentPage * QUESTIONS_PER_PAGE;
        const end = Math.min(start + QUESTIONS_PER_PAGE, filtered.length);
        const pageQuestions = filtered.slice(start, end);

        const container = document.getElementById("dynamicQuestions");
        if (!pageQuestions.length) {
            container.innerHTML = "<div style='padding:30px;text-align:center'>✨ No questions in this module</div>";
            document.getElementById("paginationControls").style.display = "none";
            return;
        }

        let html = "";
        pageQuestions.forEach((q, idxOnPage) => {
            const globalIdx = q.originalIndex;
            const selectedVal = userAnswers[globalIdx];
            let feedbackHtml = "";
            if (graded) {
                const isCorrect = (selectedVal && selectedVal === q.correct);
                if (selectedVal) {
                    feedbackHtml = `<div class="feedback ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✔ Correct' : `✘ Wrong. Correct: ${q.correct}`}</div>`;
                } else {
                    feedbackHtml = `<div class="feedback wrong">⚠ Not answered (correct: ${q.correct})</div>`;
                }
            }
            // display number = global question number (1-indexed)
            const displayNumber = globalIdx + 1;
            html += `<div class="question-card">
                        <div class="question-text"><strong>${displayNumber}. ${q.fullText}</strong></div>
                        <div class="options">`;
            const letters = ["A","B","C","D"];
            q.options.forEach((opt, optIdx) => {
                const letter = letters[optIdx];
                const checkedAttr = (selectedVal === letter) ? "checked" : "";
                html += `<label class="option-label ${selectedVal === letter ? 'selected' : ''}">
                            <input type="radio" name="q${globalIdx}" value="${letter}" ${checkedAttr} onchange="selectAnswer(${globalIdx}, '${letter}')">
                            <span><strong>${letter}.</strong> ${opt}</span>
                         </label>`;
            });
            html += `</div>${feedbackHtml}</div>`;
        });
        container.innerHTML = html;

        // attach sounds to newly created option labels
        attachSoundsToContainer(container);

        const paginationDiv = document.getElementById("paginationControls");
        if (currentModule === "all" && totalPages > 1) {
            paginationDiv.style.display = "flex";
            document.getElementById("pageInfo").innerText = `Page ${currentPage+1} of ${totalPages}`;
            document.getElementById("prevPageBtn").disabled = (currentPage === 0);
            document.getElementById("nextPageBtn").disabled = (currentPage === totalPages-1);
        } else {
            paginationDiv.style.display = "none";
        }

        const scoreDiv = document.getElementById("scoreDisplay");
        if (graded) {
            let correctCount = 0;
            const currentFiltered = getFilteredQuestions();
            for (let q of currentFiltered) {
                const ans = userAnswers[q.originalIndex];
                if (ans && ans === q.correct) correctCount++;
            }
            scoreDiv.innerHTML = `🎯 Score: ${correctCount} / ${currentFiltered.length} (${Math.round((correctCount/currentFiltered.length)*100)}%) ${currentModule !== "all" ? `| Module ${currentModule}` : "| All modules"}`;
        } else {
            scoreDiv.innerHTML = "📝 Choose your answers and click SUBMIT to see detailed results.";
        }
    }

    window.selectAnswer = function(globalIdx, letter) {
        userAnswers[globalIdx] = letter;
        if (graded) {
            graded = false;
            document.getElementById("scoreDisplay").innerHTML = "📝 Answers changed. Submit again to refresh score.";
        }
        renderQuestions();
    };

    function submitExam() {
        graded = true;
        renderQuestions();
    }

    function resetExam() {
        userAnswers.fill(null);
        graded = false;
        renderQuestions();
    }

    function nextPage() {
        const filtered = getFilteredQuestions();
        const totalPages = Math.ceil(filtered.length / QUESTIONS_PER_PAGE);
        if (currentPage + 1 < totalPages) {
            currentPage++;
            renderQuestions();
        }
    }

    function prevPage() {
        if (currentPage > 0) {
            currentPage--;
            renderQuestions();
        }
    }

    function buildTabs() {
        const tabsDiv = document.getElementById("tabContainer");
        const modules = [
            { id: "all", label: "📋 ALL 117" },
            { id: 1, label: "Module 1" }, { id: 2, label: "Module 2" }, { id: 3, label: "Module 3" },
            { id: 4, label: "Module 4" }, { id: 5, label: "Module 5" }, { id: 6, label: "Module 6" },
            { id: 7, label: "Module 7" }, { id: 8, label: "Module 8" }, { id: 9, label: "Module 9" }, { id: 10, label: "Module 10" }
        ];
        tabsDiv.innerHTML = "";
        modules.forEach(mod => {
            const btn = document.createElement("button");
            btn.className = "tab-btn";
            if ((currentModule === "all" && mod.id === "all") || (currentModule === mod.id)) btn.classList.add("active");
            btn.innerText = mod.label;
            btn.onclick = () => {
                currentModule = mod.id;
                currentPage = 0;
                graded = false;
                renderQuestions();
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            };
            tabsDiv.appendChild(btn);
        });
        attachSoundsToContainer(tabsDiv);
    }

    document.getElementById("submitExam").onclick = submitExam;
    document.getElementById("resetExam").onclick = resetExam;
    document.getElementById("prevPageBtn").onclick = prevPage;
    document.getElementById("nextPageBtn").onclick = nextPage;
    buildTabs();
    renderQuestions();
</script>
</body>
</html>
