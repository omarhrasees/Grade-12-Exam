            font-weight: 600;

        .reset-btn {

            border-radius: 60px;

<script>
    function playClick() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 880;
            gainNode.gain.value = 0.12;
            oscillator.type = "sine";
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.12);
            oscillator.stop(audioCtx.currentTime + 0.12);
            if (audioCtx.state === 'suspended') audioCtx.resume();
        } catch(e) {}
    }
    function attachSoundsToContainer(container) {
        if (!container) return;
        const clickables = container.querySelectorAll('button, .tab-btn, .option-label, input[type="radio"]');
        clickables.forEach(el => {
            if (!el.hasAttribute('data-sound-attached')) {
                el.setAttribute('data-sound-attached', 'true');
                el.addEventListener('click', (e) => { playClick(); });
            }
        });
    }
    document.addEventListener('click', (e) => {
        if (e.target.closest('.tab-btn') || e.target.closest('.submit-btn') || e.target.closest('.reset-btn') || e.target.closest('.page-btn') || e.target.closest('.modal-close')) playClick();
    });

    // ==================== ALL 110 QUESTIONS (full text from your list, pronunciation removed) ====================
    const allQuestions = [];
    function addQ(moduleId, fullText, optA, optB, optC, optD, correct) {
        allQuestions.push({ module: moduleId, text: fullText, options: [optA, optB, optC, optD], correct: correct.toUpperCase() });
    }
    // Q1-11 (Module 1), skip Q12 (pronunciation)
    addQ(1, "1. Complete the sentence with the correct word:\n\"I really ______ a kick out of mystery stories.\"", "get", "take", "have", "make", "A");
    addQ(1, "2. Complete the sentence with the correct idiom:\n\"He never tells anyone what he's thinking. He's a bit of ______.\"", "a cold fish", "a dark horse", "a soft touch", "a mover and shaker", "A");
    addQ(1, "3. Complete the sentence with the correct word:\n\"The quality of being easily hurt is called ______.\"", "disposition", "vulnerability", "destiny", "trait", "B");
    addQ(1, "4. Complete the sentence with the correct preposition:\n\"She sets great store ______ good table manners.\"", "by", "in", "with", "at", "A");
    addQ(1, "5. Complete the sentence with the correct compound adjective:\n\"I joined a film club hoping to meet ______ people at school.\"", "like-minded", "kind-hearted", "narrow-minded", "thin-skinned", "A");
    addQ(1, "6. Complete the sentence with the correct adjective:\n\"I'm sorry, but we need to have a ______ discussion about your negative attitude.\"", "spontaneous", "committed", "frank", "stable", "C");
    addQ(1, "7. Complete the sentence with the correct form:\n\"A Hi. I haven't heard from you for a while, what ______ with yourself?\"", "have you been doing", "did you do", "were you doing", "had you done", "A");
    addQ(1, "8. Complete the sentence with the correct form:\n\"Recently, I ______ five kilometres every day.\"", "have been running", "had run", "will have been running", "was running", "A");
    addQ(1, "9. Complete the sentence with the correct form:\n\"I'm a real bookworm. So far this month I ______ six books.\"", "have been reading", "had read", "have read", "was reading", "C");
    addQ(1, "10. Complete the sentence with the correct form:\n\"It ______ all day. I'm fed up with it.\"", "has been raining", "has rained", "had been raining", "was raining", "A");
    addQ(1, "11. Complete the sentence with no more than three words:\n\"I ______ seen you for ages! Where have you been hiding?!\"", "haven't", "hadn't", "didn't have", "wasn't", "A");
    // Q13-23 (Module 2), skip Q24
    addQ(2, "13. Complete the sentence with the correct verb:\n\"After hurting his ankle, the footballer ______ off the pitch to get some help.\"", "hobbled", "strode", "surged", "wobbled", "A");
    addQ(2, "14. Complete the sentence with the correct word:\n\"There are new roadworks in the town centre, and it is driving motorists up the ______.\"", "wall", "boat", "ride", "downhill", "A");
    addQ(2, "15. Complete the sentence with the correct form of the verb:\n\"Reem ______ through her interview to become a tour guide.\"", "sailed", "staggered", "stumbled", "parked", "A");
    addQ(2, "16. Complete the sentence with the correct word:\n\"When the Prime Minister got out of the car, the reporters suddenly ______ forward and nearly knocked over the security guards.\"", "shuffled", "lurched", "surged", "hobbled", "C");
    addQ(2, "17. Complete the sentence with the correct word:\n\"The business has been going ______ since the new company took it over.\"", "downstairs", "downhill", "downward", "downstreet", "B");
    addQ(2, "18. Complete the sentence with the correct form of the verb:\n\"Eman ______ through all the questions in the test and finished at least ten minutes before anyone else.\"", "sailed", "staggered", "stumbled", "jumped", "A");
    addQ(2, "19. Complete the sentence with the correct word:\n\"Recently, the rising cost of university education has caused an ______ from students and parents.\"", "outcry", "outlay", "outlook", "outcome", "A");
    addQ(2, "20. Which sentence means the same as: 'Never before had I experienced such intense heat.'", "I had never experienced such intense heat before.", "I never experienced such intense heat before.", "Never I had experienced such intense heat before.", "I had experienced never such intense heat before.", "A");
    addQ(2, "21. Rewrite the sentence using inversion starting with the words in bold:\n'He never felt sorry for himself. NOT ONCE ______'", "Not once he felt sorry for himself.", "Not once did he feel sorry for himself.", "Not once he did feel sorry for himself.", "Not once felt he sorry for himself.", "B");
    addQ(2, "22. Rewrite the sentence using inversion:\n'The driving examiner was extremely strict. Very few students passed first time. So strict ______'", "So strict was the driving examiner that very few students passed first time.", "So strict the driving examiner was that very few students passed first time.", "So strict did the driving examiner be that very few students passed first time.", "So strict were the driving examiner that very few students passed first time.", "A");
    addQ(2, "23. Rewrite the sentence starting with the words given:\n'I wanted a mountain bike, not a road bike. What ______'", "What I wanted was a mountain bike, not a road bike.", "What did I want was a mountain bike, not a road bike.", "What I wanted a mountain bike, not a road bike.", "What wanted I was a mountain bike, not a road bike.", "A");
    // Q25-35 (Module 3), skip Q36
    addQ(3, "25. Complete the sentence with the correct word:\n\"The ______ of this kind of service is that it is very eco-friendly.\"", "price tag", "USP", "venture", "turnover", "B");
    addQ(3, "26. Complete the sentence with the correct compound noun:\n\"They're giving away free toys with children's meals as a part of a sales ______.\"", "gimmick", "buy", "investment", "up", "A");
    addQ(3, "27. Complete the sentence with the correct word:\n\"She ______ the child to clean her teeth.\"", "coerced", "incited", "coaxed", "pressured", "C");
    addQ(3, "28. Complete the word (definition: a feature which makes a product different from the rest):\n\"A feature of a product or service which makes it different from the rest - U ______\"", "UP", "SP", "USP", "USE", "C");
    addQ(3, "29. Complete the sentence with the correct word:\n\"They're offering free cinema tickets as a sales ______.\"", "concept", "gimmick", "quote", "tag", "B");
    addQ(3, "30. Complete the sentence with the correct verb:\n\"Issa took out a loan to set up his business, so now he ______ the bank money every month.\"", "budgets", "refunds", "owes", "withdraws", "C");
    addQ(3, "31. Complete the sentence with the correct word:\n\"The shops need to keep coming up with new sales ______ to encourage people to go in.\"", "gimmicks", "goods", "margins", "sprees", "A");
    addQ(3, "32. Find and correct the mistake in this sentence:\n'Leeds Corn Exchange built in 1863.'", "was built", "is built", "has built", "had built", "A");
    addQ(3, "33. Rewrite the sentence using the Passive:\n'We will prosecute all shoplifters.'", "All shoplifters will prosecute.", "All shoplifters will be prosecuted.", "All shoplifters are prosecuted.", "All shoplifters have been prosecuted.", "B");
    addQ(3, "34. Complete the sentence with the correct form of the verb in brackets:\n'It is often difficult ______ (see) the outside world when you're in a shopping mall.'", "to be seen", "to see", "to have seen", "to be seeing", "B");
    addQ(3, "35. Complete the sentence with the correct phrase:\n'When it ______, it seemed as if voice shopping might be the next big thing.'", "was first launched", "is first launched", "has been first launched", "will be first launched", "A");
    // Q37-47 (Module 4), skip Q48
    addQ(4, "37. Complete the sentence with the correct adjective:\n\"I was expecting the steak to be ______ but instead, it was tough and very chewy.\"", "tender", "greasy", "stodgy", "scalding", "A");
    addQ(4, "38. Complete the sentence with the correct partitive:\n\"Always add a ______ of salt to beaten eggs.\"", "drop", "pinch", "dab", "sprinkle", "B");
    addQ(4, "39. Complete the sentence with the correct verb:\n\"I was starving and ______ the whole plate of sandwiches in five minutes.\"", "wavered", "triggered", "devoured", "bombarded", "C");
    addQ(4, "40. Choose the correct meaning for the underlined word:\n'The meat is gristly.'", "hard and chewy", "tasty and well-seasoned", "moist and tender", "soft and fluffy", "A");
    addQ(4, "41. Complete the sentence with the correct adjective:\n'Amer Would you like some more chips? Saeed No, thanks. They're a bit too ______.'", "tender", "scalding", "tempting", "greasy", "D");

    // ========== STATE ==========
    let currentModule = "all";
    let userAnswers = new Array(allQuestions.length).fill(null);
    let graded = false;
    let currentPage = 0;
    const PER_PAGE = 10;
    function getFiltered() {
        if (currentModule === "all") return allQuestions.map((q, idx) => ({ ...q, originalIndex: idx }));
        return allQuestions.map((q, idx) => ({ ...q, originalIndex: idx })).filter(q => q.module === currentModule);
    }
    function showPopup(correct, total) {
        const modal = document.getElementById("resultModal");
        document.getElementById("modalScore").innerText = `${correct} / ${total} (${Math.round((correct/total)*100)}%)`;
        const perc = (correct/total)*100;
        let msg = perc >= 80 ? "🌟 Excellent! Keep up the great work!" : perc >= 60 ? "👍 Good job! A bit more practice will make perfect." : perc >= 40 ? "📚 Nice attempt! Review the material and try again." : "💪 Keep learning! Every mistake is a step forward.";
        document.getElementById("modalMessage").innerText = msg;
        modal.style.display = "flex";
    }
    function renderQuestions() {
        const filtered = getFiltered();
        const container = document.getElementById("dynamicQuestions");
        if (currentModule !== "all") {
            let html = "";
            filtered.forEach((q) => {
                const globalIdx = q.originalIndex;
                const selected = userAnswers[globalIdx];
                let fb = "";
                if (graded) {
                    const isCor = (selected && selected === q.correct);
                    if (selected) fb = `<div class="feedback ${isCor ? 'correct' : 'wrong'}">${isCor ? '✔ Correct' : `✘ Wrong. Correct: ${q.correct}`}</div>`;
                    else fb = `<div class="feedback wrong">⚠ Not answered (correct: ${q.correct})</div>`;
                }
                html += `<div class="question-card"><div class="question-text"><strong>${q.text}</strong></div><div class="options">`;
                const letters = ["A","B","C","D"];
                q.options.forEach((opt, oi) => {
                    const letter = letters[oi];
                    const checked = (selected === letter) ? "checked" : "";
                    html += `<label class="option-label ${selected === letter ? 'selected' : ''}"><input type="radio" name="q${globalIdx}" value="${letter}" ${checked} onchange="selectAnswer(${globalIdx}, '${letter}')"><span><strong>${letter}.</strong> ${opt}</span></label>`;
                });
                html += `</div>${fb}</div>`;
            });
            container.innerHTML = html;
            attachSoundsToContainer(container);
            document.getElementById("paginationControls").style.display = "none";
            if (graded) {
                let correctCount = 0;
                for (let q of filtered) if (userAnswers[q.originalIndex] === q.correct) correctCount++;
                document.getElementById("scoreDisplay").innerHTML = `🎯 Score: ${correctCount} / ${filtered.length} (${Math.round((correctCount/filtered.length)*100)}%) | Module ${currentModule}`;
            } else document.getElementById("scoreDisplay").innerHTML = "📝 Choose your answers and click SUBMIT to see detailed results.";
            return;
        }
        const totalPages = Math.ceil(filtered.length / PER_PAGE);
        if (currentPage >= totalPages) currentPage = Math.max(0, totalPages-1);
        const pageItems = filtered.slice(currentPage * PER_PAGE, (currentPage+1) * PER_PAGE);
        if (!pageItems.length) { container.innerHTML = "<div style='padding:30px;text-align:center'>✨ No questions</div>"; return; }
        let html = "";
        pageItems.forEach((q) => {
            const globalIdx = q.originalIndex;
            const selected = userAnswers[globalIdx];
            let fb = "";
            if (graded) {
                const isCor = (selected && selected === q.correct);
                if (selected) fb = `<div class="feedback ${isCor ? 'correct' : 'wrong'}">${isCor ? '✔ Correct' : `✘ Wrong. Correct: ${q.correct}`}</div>`;
                else fb = `<div class="feedback wrong">⚠ Not answered (correct: ${q.correct})</div>`;
            }
            html += `<div class="question-card"><div class="question-text"><strong>${q.text}</strong></div><div class="options">`;
            const letters = ["A","B","C","D"];
            q.options.forEach((opt, oi) => {
                const letter = letters[oi];
                const checked = (selected === letter) ? "checked" : "";
                html += `<label class="option-label ${selected === letter ? 'selected' : ''}"><input type="radio" name="q${globalIdx}" value="${letter}" ${checked} onchange="selectAnswer(${globalIdx}, '${letter}')"><span><strong>${letter}.</strong> ${opt}</span></label>`;
            });
            html += `</div>${fb}</div>`;
        });
        container.innerHTML = html;
        attachSoundsToContainer(container);
        const pagDiv = document.getElementById("paginationControls");
        if (totalPages > 1) {
            pagDiv.style.display = "flex";
            document.getElementById("pageInfo").innerText = `Page ${currentPage+1} of ${totalPages}`;
            document.getElementById("prevPageBtn").disabled = (currentPage === 0);
            document.getElementById("nextPageBtn").disabled = (currentPage === totalPages-1);
        } else pagDiv.style.display = "none";
        if (graded) {
            let correctCount = 0;
            for (let q of filtered) if (userAnswers[q.originalIndex] === q.correct) correctCount++;
            document.getElementById("scoreDisplay").innerHTML = `🎯 Score: ${correctCount} / ${filtered.length} (${Math.round((correctCount/filtered.length)*100)}%) | All modules`;
        } else document.getElementById("scoreDisplay").innerHTML = "📝 Choose your answers and click SUBMIT to see detailed results.";
    }
    window.selectAnswer = function(globalIdx, letter) { userAnswers[globalIdx] = letter; if(graded) graded=false; renderQuestions(); };
    function submitExam() { const filtered = getFiltered(); let correct = 0; for (let q of filtered) if (userAnswers[q.originalIndex] === q.correct) correct++; graded = true; renderQuestions(); showPopup(correct, filtered.length); }
    function resetExam() { userAnswers.fill(null); graded = false; renderQuestions(); }
    function nextPage() { const total = Math.ceil(getFiltered().length/PER_PAGE); if(currentPage+1 < total) { currentPage++; renderQuestions(); } }
    function prevPage() { if(currentPage > 0) { currentPage--; renderQuestions(); } }
    function buildTabs() {
        const tabsDiv = document.getElementById("tabContainer");
        const items = [{id:"all", label:"📋 ALL 110"}];
        for(let i=1;i<=10;i++) items.push({id:i, label:`Module ${i}`});
        tabsDiv.innerHTML = "";
        items.forEach(mod => {
            const btn = document.createElement("button");
            btn.className = "tab-btn";
            if ((currentModule === "all" && mod.id === "all") || currentModule === mod.id) btn.classList.add("active");
            btn.innerText = mod.label;
            btn.onclick = () => { currentModule = mod.id; currentPage = 0; graded = false; renderQuestions(); document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); };
            tabsDiv.appendChild(btn);
        });
        attachSoundsToContainer(tabsDiv);
    }
    document.getElementById("submitExam").onclick = submitExam;
    document.getElementById("resetExam").onclick = resetExam;
    document.getElementById("prevPageBtn").onclick = prevPage;
    document.getElementById("nextPageBtn").onclick = nextPage;
    document.getElementById("closeModalBtn").onclick = () => document.getElementById("resultModal").style.display = "none";
    buildTabs();
    renderQuestions();
</script>
