    addQ(8, "Complete the sentence with the correct form of the phrasal verb from the box:", "My friends and I have ______ to running for an hour every day after school.", "come down hard on", "held off on", "taken to", "set about", "C");

    addQ(8, "Complete the text with the correct article (a/an, the, or o):", "Human beings are social creatures... very often we are indeed influenced by what ______ others think.", "the", "an", "a", "o", "D");

    addQ(8, "According to the Active Pronunciation box, in two-part phrasal verbs, where is the main stress usually placed?", "Choose the correct option:", "on the verb", "on the particle", "equally on both parts", "on the word before the verb", "B");

    // ================= MODULE 9 (12 questions) =================
    addQ(9, "Complete the sentence with the correct adjective from the box:", "Whenever I see illusions like this, it's completely ______.", "baffling", "riveting", "mesmerising", "heart-stopping", "A");

    addQ(10, "Complete the sentence with the correct form of the verb from the box:", "I got to ______ the ropes...", "learn", "meet", "call", "sign", "A");

    addQ(10, "Why do speakers insert pauses when speaking?", "According to the Active Pronunciation box:", "only to breathe", "to add emphasis, indicate a change in topic, clarify meaning, and as a mental filler", "only to indicate a change in tone", "only to replace full stops", "B");

    // ========== UI LOGIC ==========
    let currentModule = "all";
    let userAnswers = new Array(allQuestions.length).fill(null);
    let graded = false;
    let currentQuestionsList = [];

    function renderQuestions() {
        const container = document.getElementById("dynamicQuestions");
        let questionsToShow = [];
        if (currentModule === "all") {
            questionsToShow = allQuestions.map((q, idx) => ({ ...q, originalIndex: idx }));
        } else {
            questionsToShow = allQuestions
                .map((q, idx) => ({ ...q, originalIndex: idx }))
                .filter(q => q.module === currentModule);
        }
        currentQuestionsList = questionsToShow;
        if (!questionsToShow.length) {
            container.innerHTML = "<div style='padding:30px;text-align:center'>✨ No questions in this module</div>";
            return;
        }
        let html = "";
        questionsToShow.forEach((q, idxLocal) => {
            const globalIdx = q.originalIndex;
            const selectedVal = userAnswers[globalIdx];
            let feedbackHtml = "";
            if (graded) {
                const isCorrect = (selectedVal && selectedVal === q.correct);
                if (selectedVal) {
                    feedbackHtml = `<div class="feedback ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✔ Correct' : `✘ Wrong. Correct answer: ${q.correct}`}</div>`;
                } else {
                    feedbackHtml = `<div class="feedback wrong">⚠ Not answered (correct answer: ${q.correct})</div>`;
                }
            }
            html += `<div class="question-card">
                        <div class="question-instruction">${q.instruction}</div>
                        <div class="question-text">${idxLocal+1}. ${q.text}</div>
                        <div class="options">`;
            const letters = ["A","B","C","D"];
            q.options.forEach((opt, optIdx) => {
                const letter = letters[optIdx];
                const checkedAttr = (selectedVal === letter) ? "checked" : "";
                html += `<label class="option-label ${selectedVal === letter ? 'selected' : ''}">
                            <input type="radio" name="q${globalIdx}" value="${letter}" ${checkedAttr} onchange="selectAnswer(${globalIdx}, '${letter}')">
                            <span><strong>${letter}.</strong> ${opt}</span>
                         </label>`;
            });
            html += `</div>${feedbackHtml}</div>`;
        });
        container.innerHTML = html;
        const scoreDiv = document.getElementById("scoreDisplay");
        if (graded) {
            let correctCount = 0;
            for (let q of currentQuestionsList) {
                const ans = userAnswers[q.originalIndex];
                if (ans && ans === q.correct) correctCount++;
            }
            scoreDiv.innerHTML = `🎯 Score: ${correctCount} / ${currentQuestionsList.length} (${Math.round((correctCount/currentQuestionsList.length)*100)}%) ${currentModule !== "all" ? `| Module ${currentModule} completed` : "| All modules"}`;
        } else {
            scoreDiv.innerHTML = "📝 Choose your answers and click SUBMIT to see detailed results.";
        }
    }

    window.selectAnswer = function(globalIdx, letter) {
        userAnswers[globalIdx] = letter;
        if (graded) {
            graded = false;
            document.getElementById("scoreDisplay").innerHTML = "📝 Answers changed. Submit again to refresh score.";
        }
        renderQuestions();
    };

    function submitExam() {
        graded = true;
        renderQuestions();
    }

    function resetExam() {
        userAnswers.fill(null);
        graded = false;
        renderQuestions();
    }

    function buildTabs() {
        const tabsDiv = document.getElementById("tabContainer");
        const modules = [
            { id: "all", label: "📋 ALL 117" },
            { id: 1, label: "Module 1" }, { id: 2, label: "Module 2" }, { id: 3, label: "Module 3" },
            { id: 4, label: "Module 4" }, { id: 5, label: "Module 5" }, { id: 6, label: "Module 6" },
            { id: 7, label: "Module 7" }, { id: 8, label: "Module 8" }, { id: 9, label: "Module 9" }, { id: 10, label: "Module 10" }
        ];
        tabsDiv.innerHTML = "";
        modules.forEach(mod => {
            const btn = document.createElement("button");
            btn.className = "tab-btn";
            if ((currentModule === "all" && mod.id === "all") || (currentModule === mod.id)) btn.classList.add("active");
            btn.innerText = mod.label;
            btn.onclick = () => {
                currentModule = mod.id;
                graded = false;
                renderQuestions();
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            };
            tabsDiv.appendChild(btn);
        });
    }

    document.getElementById("submitExam").onclick = submitExam;
    document.getElementById("resetExam").onclick = resetExam;
    buildTabs();
    renderQuestions();
</script>
